name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  # First, try to create a release
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build hatchling python-semantic-release

    - name: Build package
      run: python -m build

    - name: Python Semantic Release
      id: release
      run: |
        set -e
        
        # Run semantic-release to determine next version without pushing
        export GIT_COMMITTER_NAME="github-actions[bot]"
        export GIT_COMMITTER_EMAIL="github-actions[bot]@users.noreply.github.com"
        
        echo "=== DEBUG: Starting semantic-release process ==="

        # Capture current version (read directly from _version.py)
        CURRENT_VERSION=$(grep -E "^__version__" src/mcp_memory_service/_version.py | cut -d'"' -f2 || echo "0.0.0")
        echo "DEBUG: Current version from file: $CURRENT_VERSION"
        
        # Check git log for recent commits
        echo "DEBUG: Recent commits:"
        git log --oneline -5
        
        # Check for existing tags
        echo "DEBUG: Existing tags:"
        git tag -l | tail -5 || echo "No tags found"
        
        # Show git status
        echo "DEBUG: Git status:"
        git status --porcelain
        
        # Always try to run semantic-release and capture the version change
        BEFORE_VERSION="$CURRENT_VERSION"
        echo "DEBUG: Version before semantic-release: $BEFORE_VERSION"
        
        # Run semantic-release with verbose output for debugging
        echo "DEBUG: Running semantic-release..."
        if semantic-release version --no-push --no-vcs-release --verbose; then
          echo "DEBUG: semantic-release completed successfully"
        else
          echo "DEBUG: semantic-release failed or no release needed"
        fi
        
        # Capture the version after semantic-release
        AFTER_VERSION=$(grep -E "^__version__" src/mcp_memory_service/_version.py | cut -d'"' -f2 || echo "0.0.0")
        echo "DEBUG: Version after semantic-release: $AFTER_VERSION"
        
        # Show git status after semantic-release
        echo "DEBUG: Git status after semantic-release:"
        git status --porcelain
        
        # Check if version changed
        if [ "$BEFORE_VERSION" != "$AFTER_VERSION" ]; then
          echo "✅ Version changed from $BEFORE_VERSION to $AFTER_VERSION"
          
          # Write to GITHUB_OUTPUT with clean environment
          {
            echo "released=true"
            echo "version=$AFTER_VERSION" 
            echo "tag=v$AFTER_VERSION"
          } >> $GITHUB_OUTPUT
          
          # Sync lite package version
          if [ -f pyproject-lite.toml ]; then
            sed -i "s/^version = \".*\"/version = \"$AFTER_VERSION\"/" pyproject-lite.toml
            git add pyproject-lite.toml
            git commit --amend --no-edit
            echo "✅ Synced pyproject-lite.toml to $AFTER_VERSION"
          fi

          # Create tag manually
          git tag "v$AFTER_VERSION"
          echo "✅ Tag v$AFTER_VERSION created locally"

          # Push version bump and tag to remote
          git push origin main
          git push origin "v$AFTER_VERSION"
          echo "✅ Pushed version bump and tag v$AFTER_VERSION to remote"

          echo "DEBUG: Contents written to GITHUB_OUTPUT:"
          echo "released=true"
          echo "version=$AFTER_VERSION"
          echo "tag=v$AFTER_VERSION"
        else
          echo "❌ No release needed (version unchanged: $BEFORE_VERSION)"
          
          # Write to GITHUB_OUTPUT with clean environment
          {
            echo "released=false"
            echo "version=$CURRENT_VERSION"
            echo "tag="
          } >> $GITHUB_OUTPUT
          
          echo "DEBUG: Contents written to GITHUB_OUTPUT:"
          echo "released=false"
          echo "version=$CURRENT_VERSION"
          echo "tag="
        fi
        
        echo "=== DEBUG: Final GITHUB_OUTPUT contents ==="
        cat $GITHUB_OUTPUT

  # Test uvx compatibility
  test-uvx-compatibility:
    runs-on: ubuntu-latest
    name: Test uvx compatibility
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Cache HuggingFace models
      uses: actions/cache@v5
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-huggingface-models-v2-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-huggingface-models-v2-
          ${{ runner.os }}-huggingface-models-

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        source $HOME/.cargo/env
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Test uvx compatibility
      run: |
        # Create virtual environment with uv
        uv venv

        # Install the package
        uv pip install -e .

        # Install test dependencies
        uv pip install pytest pytest-asyncio pytest-cov pytest-benchmark

        # Pre-download HuggingFace embedding model with timeout and fallback
        source .venv/bin/activate
        timeout 300 python scripts/ci/download_model_with_timeout.py || {
          echo "⚠️ Model download timed out after 5 minutes"
          echo "SKIP_MODEL_TESTS=true" >> $GITHUB_ENV
        }

        # Run import validation (fast-fail before tests)
        echo "=== Import Validation ==="
        source .venv/bin/activate
        bash scripts/ci/validate_imports.sh

        # Run handler coverage check
        echo "=== Handler Coverage Check ==="
        source .venv/bin/activate
        python scripts/validation/check_handler_coverage.py

        # Run tests with coverage
        # Set default env vars to disable auth for most tests
        # Middleware tests will override these to test auth explicitly
        source .venv/bin/activate
        export MCP_API_KEY=""
        export MCP_OAUTH_ENABLED="false"
        export MCP_ALLOW_ANONYMOUS_ACCESS="true"
        python -m pytest tests/ -v \
          --cov=src/mcp_memory_service \
          --cov-report=term-missing \
          --cov-report=html \
          --cov-fail-under=57 || {
            echo "❌ Coverage below 57% threshold"
            exit 1
          }

        echo "✓ Tests completed with coverage ≥57%"

        # Build wheel for uvx testing
        uv build

        # Test package structure compatibility
        echo "✓ Package structure compatible with uvx"

  # Test Docker build
  test-docker-build:
    runs-on: ubuntu-latest
    name: Test Docker build
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./tools/docker/Dockerfile
        platforms: linux/amd64
        push: false
        load: true
        tags: mcp-memory-service:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        # Debug: List all docker images
        echo "Available Docker images:"
        docker images

        # Test image can be created (override entrypoint to run python directly)
        docker run --rm --entrypoint="" mcp-memory-service:test python -c "print('✓ Docker image works')"

        # Test that the server can show help (disable OAuth to avoid JWT key requirement)
        docker run --rm -e MCP_OAUTH_ENABLED=false mcp-memory-service:test --help > /dev/null && echo "✓ Server help works"

  # Milvus storage backend integration tests against a real Milvus standalone server.
  # Runs on main-branch pushes and on PRs labeled `backend:milvus` to avoid burning
  # CI minutes on unrelated changes. Uses `docker run` (not service containers) to
  # match the existing test-docker-build pattern in this workflow.
  test-milvus-docker:
    runs-on: ubuntu-latest
    name: Test Milvus (Docker)
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'backend:milvus')
    timeout-minutes: 25

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache HuggingFace models
      uses: actions/cache@v5
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-huggingface-models-v2-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-huggingface-models-v2-
          ${{ runner.os }}-huggingface-models-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,milvus]"

    - name: Pre-download embedding model
      run: |
        timeout 300 python scripts/ci/download_model_with_timeout.py || {
          echo "⚠️ Model download timed out; continuing with offline flags set"
        }

    - name: Start Milvus standalone
      run: |
        # Milvus standalone requires etcd + MinIO; use the official compose
        # manifest from the Milvus v2.5.27 release, which wires all three up.
        curl -fsSL -o milvus-compose.yml \
          https://github.com/milvus-io/milvus/releases/download/v2.5.27/milvus-standalone-docker-compose.yml
        docker compose -f milvus-compose.yml up -d
        echo "Waiting for Milvus to be healthy..."
        for i in $(seq 1 90); do
          if curl -sf http://localhost:9091/healthz > /dev/null 2>&1; then
            echo "Milvus ready after ~$((i*2))s"
            break
          fi
          if [ $i -eq 90 ]; then
            echo "Milvus failed to start within 180s"
            docker compose -f milvus-compose.yml ps
            docker compose -f milvus-compose.yml logs
            exit 1
          fi
          sleep 2
        done

    - name: Run Milvus integration tests
      env:
        MCP_MEMORY_STORAGE_BACKEND: milvus
        MCP_MILVUS_URI: http://localhost:19530
        MCP_MILVUS_COLLECTION_NAME: ci_test
        HF_HUB_OFFLINE: "1"
        TRANSFORMERS_OFFLINE: "1"
      run: |
        python -m pytest tests/storage/test_milvus.py -v \
          --timeout=120 \
          -k "not lite" \
          --tb=short

    - name: Milvus Docker smoke test (health + store + search)
      env:
        MCP_MILVUS_URI: http://localhost:19530
        HF_HUB_OFFLINE: "1"
        TRANSFORMERS_OFFLINE: "1"
      run: |
        python - <<'PY'
        import asyncio, hashlib
        from mcp_memory_service.storage.milvus import MilvusMemoryStorage
        from mcp_memory_service.models.memory import Memory

        async def main():
            s = MilvusMemoryStorage(
                uri="http://localhost:19530",
                collection_name="ci_smoke",
            )
            await s.initialize()
            content = "CI smoke test content"
            h = hashlib.sha256(content.encode()).hexdigest()
            m = Memory(
                content=content,
                content_hash=h,
                tags=["ci"],
                memory_type="note",
            )
            ok, msg = await s.store(m)
            assert ok, f"Store failed: {msg}"
            # Milvus standalone uses Bounded consistency by default; allow a
            # short window for the growing segment to become searchable via
            # AUTOINDEX before the first KNN query.
            await asyncio.sleep(3)
            results = await s.retrieve("smoke test", n_results=3)
            assert len(results) >= 1, f"Expected >=1 result, got {len(results)}"
            count = await s.count_all_memories()
            assert count >= 1, f"Expected count>=1, got {count}"
            print(
                f"Milvus Docker smoke test passed: "
                f"stored=True, retrieved={len(results)}, count={count}"
            )

        asyncio.run(main())
        PY

    - name: Dump Milvus logs on failure
      if: failure()
      run: |
        docker compose -f milvus-compose.yml ps || true
        docker compose -f milvus-compose.yml logs || true

    - name: Cleanup
      if: always()
      run: docker rm -f milvus 2>/dev/null || true

  # Publish to Docker Hub (only after release)
  publish-docker-hub:
    needs: [release, test-docker-build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver: docker-container  # Use container driver for multi-platform builds

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: docker.io/doobidoo/mcp-memory-service
        tags: |
          type=raw,value=latest
          type=raw,value=${{ needs.release.outputs.version }}
          type=semver,pattern={{version}},value=${{ needs.release.outputs.tag }}
          type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.tag }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./tools/docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Publish to GitHub Container Registry
  publish-ghcr:
    needs: [test-uvx-compatibility, test-docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Publish to GHCR
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver: docker-container  # Use container driver for multi-platform builds

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/doobidoo/mcp-memory-service
        tags: |
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./tools/docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max